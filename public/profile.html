<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - ElectraCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page {
            max-width: 1200px;
            margin: 40px auto 0;
            padding: 0 20px 60px;
        }
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .profile-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            overflow: hidden;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-text h2 {
            font-size: 22px;
            margin-bottom: 4px;
        }
        .profile-text p {
            color: var(--muted);
            font-size: 14px;
        }
        .edit-btn {
            padding: 10px 28px;
            border-radius: 999px;
            border: none;
            background: var(--teal);
            color: var(--white);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .edit-btn:hover {
            opacity: 0.9;
        }
        .edit-btn.cancel-btn {
            background: var(--muted);
        }
        .field.edit-mode .field-view { display: none; }
        .field.edit-mode .field-edit { display: flex !important; }
        .field .field-edit {
            display: none;
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--white);
            font-size: 14px;
            color: var(--dark);
        }
        .field .field-edit:focus {
            outline: none;
            border-color: var(--teal);
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 18px 24px;
            margin-bottom: 32px;
        }
        .field-group label {
            display: block;
            font-size: 14px;
            color: var(--dark);
            margin-bottom: 6px;
        }
        .field {
            width: 100%;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--field-bg);
            font-size: 14px;
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .field span {
            flex: 1;
        }
        .field.select::after {
            content: '▾';
            font-size: 12px;
            color: var(--muted);
            margin-right: 8px;
        }

        .email-section h3 {
            font-size: 16px;
            margin-bottom: 12px;
        }
        .email-card {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            background: var(--white);
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.03);
            margin-bottom: 12px;
        }
        .email-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-size: 14px;
        }
        .email-text span {
            display: block;
        }
        .email-text .address {
            font-size: 14px;
        }
        .email-text .meta {
            font-size: 12px;
            color: var(--muted);
        }
        .add-email-btn {
            margin-top: 8px;
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            background: #e0e0e0;
            color: var(--dark);
            font-size: 14px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .profile-info {
                flex-direction: column;
            }
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

        </a>

            <input type="text" placeholder="Search essentials, groceries and more...">

            <span></span>

    </header>

    <main class="page fade-in-up">
        <section class="profile-header">

            </div>
            <div class="field-group" data-field="nick">

            <div class="field-group" data-field="gender">

            <div class="field-group" data-field="country">

                </div>
            </div>
            <div class="field-group" data-field="language">
                <label>Language</label>
                <div class="field select">
                    <span class="field-view" id="viewLanguage"></span>
                    <select class="field-edit" id="inputLanguage">
                        <option value="">Select language</option>
                        <option value="en">English</option>
                        <option value="ar">Arabic</option>
                        <option value="fr">French</option>

                    </select>
                </div>
            </div>
            <div class="field-group" data-field="timezone">
                <label>Time Zone</label>
                <div class="field select">
                    <span class="field-view" id="viewTimezone"></span>
                    <select class="field-edit" id="inputTimezone">
                        <option value="">Select time zone</option>
                        <option value="Africa/Cairo">Africa/Cairo</option>
                        <option value="Asia/Riyadh">Asia/Riyadh</option>
                        <option value="Asia/Dubai">Asia/Dubai</option>
                        <option value="UTC">UTC</option>

                    </select>

            </div>
            <div class="field-group" data-field="address">
                <label>Delivery Address</label>
                <div class="field">
                    <span class="field-view" id="viewAddress"></span>
                    <input class="field-edit" type="text" id="inputAddress" placeholder="Delivery address">
                </div>
            </div>
        </section>

        <section class="email-section">

            <div class="email-card">

                <div class="email-text">

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const raw = localStorage.getItem('currentUser');
            if (!raw) {
                window.location.href = 'signin.html';
                return;
            }
            let user;
            try {
                user = JSON.parse(raw);
            } catch (e) {
                localStorage.removeItem('currentUser');
                window.location.href = 'signin.html';
                return;
            }

            const fields = ['first', 'last', 'nick', 'gender', 'country', 'language', 'timezone', 'address'];
            const placeholders = {
                first: 'First name',
                last: 'Last name',
                nick: 'Nick name',
                gender: 'Your gender',
                country: 'Your country',
                language: 'Your language',
                timezone: 'Your time zone',
                address: 'Delivery address'
            };

            const nameEl = document.getElementById('profileName');
            const emailEl = document.getElementById('profileEmail');
            const emailCardEl = document.getElementById('profileEmailCard');
            const editBtn = document.getElementById('editProfileBtn');
            const cancelBtn = document.getElementById('cancelProfileBtn');
            const saveBtn = document.getElementById('saveProfileBtn');
            const profileForm = document.getElementById('profileForm');

            function displayValue(value) {
                return (value && String(value).trim()) || '';
            }

            function renderProfile(u) {
                const fullName = [u.first, u.last].filter(Boolean).join(' ').trim() || 'Your Name';
                const email = u.email || '';
                if (nameEl) nameEl.textContent = fullName;
                if (emailEl) emailEl.textContent = email;
                if (emailCardEl) emailCardEl.textContent = email;
                const initial = (u.first && u.first[0]) || (u.last && u.last[0]) || (email && email[0]) || '?';
                const avatarImg = document.getElementById('profileAvatarImg');
                if (avatarImg) {
                    const letter = encodeURIComponent(initial.toUpperCase());
                    avatarImg.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'%3E%3Ccircle fill='%23005c59' cx='36' cy='36' r='36'/%3E%3Ctext x='36' y='44' text-anchor='middle' fill='white' font-size='28' font-family='sans-serif'%3E" + letter + "%3C/text%3E%3C/svg%3E";
                }
                fields.forEach(f => {
                    const viewEl = document.getElementById('view' + f.charAt(0).toUpperCase() + f.slice(1));
                    const inputEl = document.getElementById('input' + f.charAt(0).toUpperCase() + f.slice(1));
                    const val = displayValue(u[f]);
                    if (viewEl) viewEl.textContent = val || placeholders[f];
                    if (inputEl) {
                        if (inputEl.tagName === 'SELECT') {
                            inputEl.value = val || '';
                        } else {
                            inputEl.value = val;
                        }
                    }
                });
            }

            function setEditMode(editing) {
                const fieldsEl = profileForm.querySelectorAll('.field');
                fieldsEl.forEach(el => el.classList.toggle('edit-mode', editing));
                editBtn.style.display = editing ? 'none' : '';
                cancelBtn.style.display = editing ? '' : 'none';
                saveBtn.style.display = editing ? '' : 'none';
            }

            function exitEditMode() {
                setEditMode(false);
                renderProfile(user);
            }

            editBtn.addEventListener('click', () => {
                renderProfile(user);
                setEditMode(true);
            });

            cancelBtn.addEventListener('click', () => {
                exitEditMode();
            });

            saveBtn.addEventListener('click', async () => {
                const userId = user.id || user._id;
                if (!userId) {
                    alert('Session expired. Please sign in again.');
                    localStorage.removeItem('currentUser');
                    window.location.href = 'signin.html';
                    return;
                }
                const payload = {
                    userId,
                    first: (document.getElementById('inputFirst') && document.getElementById('inputFirst').value) || '',
                    last: (document.getElementById('inputLast') && document.getElementById('inputLast').value) || '',
                    nick: (document.getElementById('inputNick') && document.getElementById('inputNick').value) || '',
                    gender: (document.getElementById('inputGender') && document.getElementById('inputGender').value) || '',
                    language: (document.getElementById('inputLanguage') && document.getElementById('inputLanguage').value) || '',
                    country: (document.getElementById('inputCountry') && document.getElementById('inputCountry').value) || '',
                    timezone: (document.getElementById('inputTimezone') && document.getElementById('inputTimezone').value) || '',
                    address: (document.getElementById('inputAddress') && document.getElementById('inputAddress').value) || ''
                };
                try {
                    const apiUrl = (window.location.origin || '') + '/api/profile';
                    const res = await fetch(apiUrl, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await res.json().catch(() => ({}));
                    if (!res.ok) {
                        const msg = data.error || (res.status === 404 ? 'Server route not found. Open this site from the Node server (http://localhost:3000) and sign in again.' : 'Failed to update profile');
                        alert(msg);
                        return;
                    }
                    if (data.user) {
                        user = { ...user, ...data.user };
                        localStorage.setItem('currentUser', JSON.stringify(user));
                    }
                    exitEditMode();
                    renderProfile(user);
                } catch (err) {
                    console.error(err);
                    alert('Network error. Make sure the Node server is running (e.g. http://localhost:3000) and try again.');
                }
            });

            renderProfile(user);
        });
    </script>
</body>
