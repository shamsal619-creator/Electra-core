<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Product - ElectraCore</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-wrap { max-width: 900px; margin: 30px auto; padding: 20px; }
        .admin-card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; }
        .auth-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #f7f9fb;
            border: 1px solid #e6eaef;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .auth-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .auth-btn {
            border: 1px solid #0a8;
            color: #0a8;
            background: #fff;
            border-radius: 8px;
            padding: 8px 12px;
            text-decoration: none;
            cursor: pointer;
            font-size: 14px;
        }
        .auth-btn.primary { background: #0a8; color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
        .field input, .field textarea, .field select {
            border: 1px solid #d9d9d9; border-radius: 8px; padding: 10px; font-size: 14px;
        }
        .field textarea { min-height: 110px; resize: vertical; }
        .full { grid-column: 1 / -1; }
        .preview-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 8px; }
        .preview-list img { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd; }
        .preview-item { position: relative; }
        .remove-image-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            border: none;
            background: rgba(192, 57, 43, 0.95);
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 14px;
            line-height: 24px;
            text-align: center;
            padding: 0;
        }
        .remove-image-btn:hover { background: #a92f22; }
        .status { margin-top: 12px; font-weight: 600; }
        .btn-save { margin-top: 10px; background: #0a8; color: #fff; border: none; border-radius: 8px; padding: 12px 16px; cursor: pointer; }
        .btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
        .products-table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .products-table th, .products-table td { border-bottom: 1px solid #eee; text-align: left; padding: 10px 6px; font-size: 14px; }
        .small-btn { border: 1px solid #0a8; color: #0a8; background: #fff; border-radius: 6px; padding: 6px 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="admin-wrap">
        <div class="admin-card">
            <div class="auth-bar">
                <div id="authStatus">Checking login status...</div>
                <div class="auth-actions">
                    <a class="auth-btn" href="/signin.html?returnTo=%2Fadmin-product.html">Sign in</a>
                    <a class="auth-btn primary" href="/auth/google?returnTo=%2Fadmin-product.html">Sign in with Google</a>
                </div>
            </div>
            <h2 id="formTitle">Create Product (Multiple Images)</h2>
            <form id="productForm">
                <input type="hidden" id="editingId">
                <div class="grid">
                    <div class="field">
                        <label for="name">Name *</label>
                        <input type="text" id="name" name="name" required>
                    </div>
                    <div class="field">
                        <label for="category">Category *</label>
                        <input type="text" id="category" name="category" placeholder="laptops / phones / watches" required>
                    </div>
                    <div class="field">
                        <label for="price">Price *</label>
                        <input type="number" id="price" name="price" min="0" step="0.01" required>
                    </div>
                    <div class="field">
                        <label for="oldPrice">Old Price</label>
                        <input type="number" id="oldPrice" name="oldPrice" min="0" step="0.01">
                    </div>
                    <div class="field">
                        <label for="brand">Brand</label>
                        <input type="text" id="brand" name="brand">
                    </div>
                    <div class="field">
                        <label for="color">Color</label>
                        <input type="text" id="color" name="color">
                    </div>
                    <div class="field">
                        <label for="inStock">In Stock</label>
                        <select id="inStock" name="inStock">
                            <option value="true" selected>Yes</option>
                            <option value="false">No</option>
                        </select>
                    </div>
                    <div class="field full">
                        <label for="description">Description</label>
                        <textarea id="description" name="description"></textarea>
                    </div>
                    <div class="field full">
                        <label for="images">Images (up to 5) *</label>
                        <input type="file" id="images" name="images" accept="image/*" multiple required>
                        <div id="previewList" class="preview-list"></div>
                    </div>
                </div>
                <button id="submitBtn" class="btn-save" type="submit">Create Product</button>
                <button id="cancelEditBtn" class="btn-save" type="button" style="display:none;background:#666;">Cancel Edit</button>
                <div id="status" class="status"></div>
            </form>

            <h3 style="margin-top:28px;">Existing Products (Database)</h3>
            <button id="migrateBtn" class="small-btn" type="button" style="margin-bottom:10px;">Migrate old static products to DB</button>
            <table class="products-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Category</th>
                        <th>Price</th>
                        <th>Images</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="productsTableBody">
                    <tr><td colspan="5">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/admin-product.js"></script>
</body>
</html>
