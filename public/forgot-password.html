<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ElectraCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: var(--light);
            font-family: 'Inter', sans-serif;
        }
        .card {
            max-width: 520px;
            width: 100%;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            padding: 48px;
        }
        h2 {
            margin-top: 0;
            margin-bottom: 12px;
            font-size: 32px;
            font-weight: 800;
            color: var(--dark);
        }
        p.description {
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 24px;
        }
        .form-group label {
            font-size: 14px;
            font-weight: 600;
            color: #555;
        }
        input[type="email"] {
            height: 52px;
            padding: 12px 18px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 15px;
            background: #f8fafc;
        }
        input:focus {
            outline: none;
            border-color: var(--teal);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(5, 163, 145, 0.1);
        }
        .btn {
            width: 100%;
            height: 52px;
            background: var(--teal);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #048c7f;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(5, 163, 145, 0.2);
        }
        .message {
            margin-top: 20px;
            font-size: 15px;
            color: #253858;
            line-height: 1.7;
        }
        .message.error {
            color: #b91c1c;
        }
        .message.success {
            color: #0f766e;
        }
        .muted {
            color: #64748b;
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
        }
        .muted a {
            color: var(--teal);
            text-decoration: none;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Forgot password</h2>
        <p class="description">Enter your email address and we will send you a secure reset link so you can choose a new password.</p>
        <form id="forgotForm">
            <div class="form-group">
                <label for="forgotEmail">Email Address</label>
                <input type="email" id="forgotEmail" placeholder="your@email.com" required>
            </div>
            <button type="submit" class="btn">Send reset link</button>
            <div id="forgotMessage" class="message"></div>
        </form>
        <p class="muted">Remembered password? <a href="signin.html">Sign in</a></p>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const email = document.getElementById('forgotEmail').value.trim();
            const message = document.getElementById('forgotMessage');
            message.textContent = '';
            message.className = 'message';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (!response.ok) {
                    message.textContent = data.error || 'Unable to send reset link.';
                    message.classList.add('error');
                    return;
                }
                message.textContent = data.message || 'A reset link has been sent if the email exists.';
                message.classList.add('success');
                if (data.debugLink) {
                    const debugLink = document.createElement('div');
                    debugLink.style.marginTop = '12px';
                    debugLink.innerHTML = `Debug link: <a href="${data.debugLink}">${data.debugLink}</a>`;
                    message.appendChild(debugLink);
                }
            } catch (err) {
                message.textContent = 'Server error. Please try again later.';
                message.classList.add('error');
            }
        });
    </script>
</body>
</html>
