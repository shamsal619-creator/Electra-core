<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - ElectraCore</title>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .product-detail-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        .product-image-section {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .product-main-image {
            max-width: 100%;
            max-height: 430px;
            object-fit: contain;
            border-radius: 10px;
        }

        .product-thumbs {
            width: 100%;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .product-thumb {
            border: 2px solid transparent;
            border-radius: 8px;
            padding: 0;
            background: transparent;
            cursor: pointer;
        }

        .product-thumb.active {
            border-color: var(--teal);
        }

        .product-thumb img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 6px;
            display: block;
        }

        .product-info-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-category {
            color: var(--teal);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 14px;
        }

        .product-title {
            font-size: 32px;
            font-weight: 900;
        }

        .product-description {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
        }

        .product-price-container {
            display: flex;
            align-items: baseline;
            gap: 15px;
        }

        .current-price {
            font-size: 28px;
            font-weight: 900;
            color: var(--teal);
        }

        .old-price {
            font-size: 18px;
            color: #999;
            text-decoration: line-through;
        }

        .purchase-section {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-top: 20px;
        }

        .qty-input-group {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .qty-input-group button {
            background: #f5f5f5;
            border: none;
            width: 40px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
        }

        .qty-input-group button:first-child {
            border-right: 1px solid #ddd;
            border-radius: 7px 0 0 7px;
        }

        .qty-input-group button:last-child {
            border-left: 1px solid #ddd;
            border-radius: 0 7px 7px 0;
        }

        .qty-input-group span {
            width: 50px;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
        }

        .add-btn {
            background: var(--teal);
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            flex: 1;
        }

        .add-btn:hover {
            background: #007a7a;
        }

        /* Reviews Section */
        .reviews-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .reviews-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 30px;
            color: var(--dark);
        }

        .reviews-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 50px;
        }

        .review-item {
            background: var(--white);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .review-author {
            font-weight: 700;
            font-size: 16px;
            color: var(--dark);
        }

        .review-stars {
            color: var(--teal);
            font-size: 14px;
            letter-spacing: 2px;
        }

        .review-comment {
            color: #666;
            font-size: 15px;
            line-height: 1.6;
        }

        .write-review-section {
            background: var(--white);
            padding: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .write-review-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--dark);
        }

        .review-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label,
        .rating-selector label {
            font-weight: 600;
            font-size: 15px;
            color: var(--dark);
        }

        .rating-selector {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .star-rating {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .star-rating .star {
            background: none;
            border: none;
            font-size: 28px;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .star-rating .star:hover,
        .star-rating .star.active {
            color: var(--teal);
        }

        .selected-rating {
            font-size: 14px;
            color: var(--muted);
            min-height: 20px;
        }

        #reviewComment {
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            resize: vertical;
            color: var(--dark);
            transition: border-color 0.3s;
        }

        #reviewComment:focus {
            outline: none;
            border-color: var(--teal);
        }

        .submit-review-btn {
            background: var(--teal);
            color: var(--white);
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            align-self: flex-start;
        }

        .submit-review-btn:hover {
            background: #007a7a;
        }

        @media (max-width: 768px) {
            .product-detail-container {
                grid-template-columns: 1fr;
            }
            .product-title {
                font-size: 24px;
            }
            .purchase-section {
                flex-direction: column;
                align-items: stretch;
            }
            .reviews-container {
                margin: 40px auto;
            }
            .reviews-title {
                font-size: 22px;
            }
            .write-review-section {
                padding: 20px;
            }
            .write-review-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <img src="design/logo.png" alt="ElectraCore logo">
        </a>
        <div class="search-bar">
            <input type="text" placeholder="Search for products...">
        </div>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="user-actions" id="headerUserActions"></div>
    </header>

    <main class="product-detail-page">
        <div class="product-detail-container fade-in-up" id="productDetail">
            <!-- Dynamic Content -->
        </div>

        <!-- Reviews Section -->
        <div class="reviews-container fade-in-up">
            <h2 class="reviews-title">Customer Reviews</h2>
            
            <!-- Existing Reviews -->
            <div class="reviews-list" id="reviewsList">
                <!-- Reviews populated by JavaScript -->
            </div>

            <!-- Write a Review Form -->
            <div class="write-review-section">
                <h3 class="write-review-title">Write a Review</h3>
                <form class="review-form" id="reviewForm">
                    <div class="rating-selector">
                        <label>Your Rating:</label>
                        <div class="star-rating" id="starRating">
                            <button type="button" class="star" data-value="1" title="1 star">★</button>
                            <button type="button" class="star" data-value="2" title="2 stars">★</button>
                            <button type="button" class="star" data-value="3" title="3 stars">★</button>
                            <button type="button" class="star" data-value="4" title="4 stars">★</button>
                            <button type="button" class="star" data-value="5" title="5 stars">★</button>
                        </div>
                        <span class="selected-rating" id="selectedRating">Select a rating</span>
                    </div>

                    <div class="form-group">
                        <label for="reviewComment">Your Review:</label>
                        <textarea id="reviewComment" placeholder="Share your experience with this product..." rows="5" required></textarea>
                    </div>

                    <button type="submit" class="submit-review-btn">Submit Review</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer fade-in-up">
        <div class="footer-content">
            <div class="footer-col">
                <h4>About Us</h4>
                <p>We will always give our clients the best in order to get the best experience.</p>
            </div>
            <div class="footer-col">
                <h4>Quick Links</h4>
                <a href="index.html">Home</a>
                <a href="#">Shop</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </div>
            <div class="footer-col">
                <h4>Policies</h4>
                <a href="#">Privacy Policy</a>
                <a href="#">Terms & Conditions</a>
                <a href="#">Return Policy</a>
            </div>
            <div class="footer-col">
                <h4>Follow Us</h4>
                <div class="social-links">
                    <a href="#">f</a>
                    <a href="#">t</a>
                    <a href="#">i</a>
                    <a href="#">y</a>
                </div>
            </div>
        </div>
        <div class="copyright">
            &copy; 2026 ElectraCore. All rights reserved.
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/products-api.js"></script>
    <script src="js/product-images.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Reviews data
        const placeholderReviews = [
            {
                author: 'Ahmed Hassan',
                rating: 5,
                comment: 'Excellent quality and fast delivery. The product arrived well-packaged. Highly satisfied!'
            },
            {
                author: 'Fatima Mohamed',
                rating: 4,
                comment: 'Great value for money. Works as described. Only minor issue with the packaging, but the item is perfect.'
            },
            {
                author: 'Omar Khalil',
                rating: 5,
                comment: 'Amazing product! Exceeded my expectations. Will definitely order from ElectraCore again.'
            },
            {
                author: 'Layla Samir',
                rating: 4,
                comment: 'Very good quality. The product is exactly as shown in the pictures. Delivery was quick and reliable.'
            },
            {
                author: 'Karim Abdullah',
                rating: 5,
                comment: 'Outstanding! The best version of this product I have used. Great customer service too.'
            }
        ];

        // Render placeholder reviews
        function renderReviews() {
            const reviewsList = document.getElementById('reviewsList');
            reviewsList.innerHTML = placeholderReviews.map(review => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="review-author">${review.author}</span>
                        <span class="review-stars">${'★'.repeat(review.rating)}</span>
                    </div>
                    <p class="review-comment">${review.comment}</p>
                </div>
            `).join('');
        }

        // Star rating functionality
        let selectedRating = 0;
        function setupStarRating() {
            const stars = document.querySelectorAll('.star-rating .star');
            const selectedRatingEl = document.getElementById('selectedRating');

            stars.forEach(star => {
                star.addEventListener('click', (e) => {
                    e.preventDefault();
                    selectedRating = parseInt(star.dataset.value);
                    
                    // Update star visual state
                    stars.forEach((s, index) => {
                        if (index < selectedRating) {
                            s.classList.add('active');
                        } else {
                            s.classList.remove('active');
                        }
                    });

                    // Update text
                    selectedRatingEl.textContent = `${selectedRating} star${selectedRating !== 1 ? 's' : ''} selected`;
                });

                // Hover effect
                star.addEventListener('mouseover', () => {
                    const hoverValue = parseInt(star.dataset.value);
                    stars.forEach((s, index) => {
                        if (index < hoverValue) {
                            s.style.color = 'var(--teal)';
                        } else {
                            s.style.color = '#ddd';
                        }
                    });
                });
            });

            // Reset hover on leave
            document.querySelector('.star-rating').addEventListener('mouseleave', () => {
                stars.forEach((s, index) => {
                    if (index < selectedRating) {
                        s.style.color = 'var(--teal)';
                    } else {
                        s.style.color = '#ddd';
                    }
                });
            });
        }

        // Form submission
        function setupReviewForm() {
            const form = document.getElementById('reviewForm');
            form.addEventListener('submit', (e) => {
                e.preventDefault();

                if (selectedRating === 0) {
                    alert('Please select a rating');
                    return;
                }

                const comment = document.getElementById('reviewComment').value;
                if (!comment.trim()) {
                    alert('Please write a review');
                    return;
                }

                // Add new review to the list
                placeholderReviews.unshift({
                    author: 'You',
                    rating: selectedRating,
                    comment: comment
                });

                // Update reviews display
                renderReviews();

                // Reset form
                form.reset();
                selectedRating = 0;
                document.getElementById('selectedRating').textContent = 'Select a rating';
                document.querySelectorAll('.star-rating .star').forEach(s => {
                    s.classList.remove('active');
                    s.style.color = '#ddd';
                });

                alert('Thank you for your review!');
            });
        }

        let currentQty = 1;
        window.changeQty = (delta) => {
            currentQty += delta;
            if (currentQty < 1) currentQty = 1;
            document.getElementById('productQty').textContent = currentQty;
        };

        window.handleAddToCart = (id) => {
            const product = getProductById(id);
            const cart = JSON.parse(localStorage.getItem('cart') || '[]');
            const existingItem = cart.find(item => item.id === id);

            if (existingItem) {
                existingItem.quantity += currentQty;
            } else {
                cart.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    image: getPrimaryProductImage(product),
                    quantity: currentQty
                });
            }

            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert('Added to cart!');
        };

        function renderProductDetails(product) {
            const container = document.getElementById('productDetail');
            const productImages = getProductImages(product);
            const mainImage = productImages[0] || '';

            container.innerHTML = `
                <div class="product-image-section">
                    <img src="${mainImage}" alt="${product.name}" class="product-main-image" id="productMainImage">
                    ${productImages.length > 1 ? `
                        <div class="product-thumbs">
                            ${productImages.map((img, idx) => `
                                <button type="button" class="product-thumb ${idx === 0 ? 'active' : ''}" data-image="${img}">
                                    <img src="${img}" alt="${product.name} thumbnail ${idx + 1}">
                                </button>
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="product-info-section">
                    <span class="product-category">${product.category}</span>
                    <h1 class="product-title">${product.name}</h1>
                    <div class="product-price-container">
                        <span class="current-price">${product.price.toLocaleString()} EGP</span>
                        ${product.oldPrice ? `<span class="old-price">${product.oldPrice.toLocaleString()} EGP</span>` : ''}
                    </div>
                    <p class="product-description">${product.description}</p>
                    
                    <div class="purchase-section">
                        <div class="qty-input-group">
                            <button onclick="changeQty(-1)">-</button>
                            <span id="productQty">1</span>
                            <button onclick="changeQty(1)">+</button>
                        </div>
                        <button class="add-btn" onclick="handleAddToCart('${product.id}')">Add to Cart</button>
                    </div>
                </div>
            `;

            const thumbButtons = container.querySelectorAll('.product-thumb');
            thumbButtons.forEach((button) => {
                button.addEventListener('click', () => {
                    const nextImage = button.dataset.image;
                    const mainImgEl = document.getElementById('productMainImage');
                    if (nextImage && mainImgEl) mainImgEl.src = nextImage;
                    thumbButtons.forEach((btn) => btn.classList.remove('active'));
                    button.classList.add('active');
                });
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.productsReadyPromise) {
                await window.productsReadyPromise;
            }
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');
            const product = getProductById(productId);

            if (product) {
                renderProductDetails(product);
            } else {
                document.getElementById('productDetail').innerHTML = `
                    <div style="text-align: center; grid-column: 1 / -1; padding: 100px 0;">
                        <h1>Product Not Found</h1>
                        <p>Sorry, we couldn't find the product you're looking for.</p>
                        <a href="index.html" class="btn" style="display: inline-block; margin-top: 20px;">Back to Home</a>
                    </div>
                `;
            }

            // Initialize reviews
            renderReviews();
            setupStarRating();
            setupReviewForm();
        });
    </script>
</body>
</html>
